<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PP2 Island Planner</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  min-height: 100vh;
}
button { cursor: pointer; font-family: inherit; }
input, select { font-family: inherit; }

/* ===== LAYOUT ===== */
#app {
  display: grid;
  grid-template-columns: 280px 1fr 300px;
  grid-template-rows: auto 1fr;
  height: 100vh;
}
header {
  grid-column: 1 / -1;
  background: #16213e;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  border-bottom: 2px solid #0f3460;
}
header h1 { font-size: 1.2rem; color: #e94560; white-space: nowrap; }

/* ===== LEFT PANEL ===== */
#left-panel {
  background: #16213e;
  border-right: 2px solid #0f3460;
  overflow-y: auto;
  padding: 10px;
}
.panel-section {
  margin-bottom: 12px;
}
.panel-section h3 {
  font-size: 0.85rem;
  color: #e94560;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ===== TOOL BUTTONS ===== */
.tool-group {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 8px;
}
.tool-btn {
  padding: 5px 10px;
  border: 2px solid #0f3460;
  border-radius: 4px;
  background: #1a1a2e;
  color: #e0e0e0;
  font-size: 0.75rem;
  transition: all 0.15s;
}
.tool-btn:hover { border-color: #e94560; }
.tool-btn.active { border-color: #e94560; background: #e94560; color: #fff; }
.tool-btn.terrain-water { border-left: 4px solid #2980b9; }
.tool-btn.terrain-river { border-left: 4px solid #3498db; }
.tool-btn.terrain-grass { border-left: 4px solid #27ae60; }
.tool-btn.terrain-forest { border-left: 4px solid #1e8449; }
.tool-btn.terrain-coastal { border-left: 4px solid #5dade2; }

/* ===== BUILDING LIST ===== */
.building-filter {
  width: 100%;
  padding: 5px 8px;
  border: 1px solid #0f3460;
  border-radius: 4px;
  background: #1a1a2e;
  color: #e0e0e0;
  font-size: 0.8rem;
  margin-bottom: 6px;
}
.tier-group { margin-bottom: 6px; }
.tier-header {
  font-size: 0.75rem;
  color: #c0c0c0;
  padding: 3px 6px;
  background: #0f3460;
  border-radius: 3px;
  cursor: pointer;
  user-select: none;
  display: flex;
  justify-content: space-between;
}
.tier-header:hover { background: #1a4080; }
.tier-buildings { display: none; padding: 3px 0; }
.tier-buildings.open { display: block; }
.building-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 4px 8px;
  border: 1px solid transparent;
  border-radius: 3px;
  background: none;
  color: #e0e0e0;
  font-size: 0.75rem;
  transition: all 0.15s;
}
.building-btn:hover { background: #1a1a2e; border-color: #0f3460; }
.building-btn.active { background: #e94560; color: #fff; }
.building-btn.locked { opacity: 0.35; }

/* ===== CANVAS AREA ===== */
#canvas-area {
  position: relative;
  overflow: hidden;
  background: #0d1117;
}
#grid-canvas {
  position: absolute;
  top: 0; left: 0;
  image-rendering: pixelated;
}

/* ===== RIGHT PANEL ===== */
#right-panel {
  background: #16213e;
  border-left: 2px solid #0f3460;
  overflow-y: auto;
  padding: 10px;
}
.info-box {
  background: #1a1a2e;
  border: 1px solid #0f3460;
  border-radius: 4px;
  padding: 8px;
  margin-bottom: 8px;
  font-size: 0.8rem;
}
.info-box h4 { color: #e94560; margin-bottom: 4px; font-size: 0.85rem; }
.info-row { display: flex; justify-content: space-between; padding: 2px 0; }
.info-label { color: #a0a0a0; }
.info-value { color: #e0e0e0; font-weight: 600; }
.error-text { color: #e74c3c; }
.warning-text { color: #f39c12; }
.ok-text { color: #2ecc71; }

/* ===== HEADER CONTROLS ===== */
.header-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.header-controls label { font-size: 0.8rem; color: #a0a0a0; }
.header-controls input, .header-controls select {
  padding: 3px 6px;
  border: 1px solid #0f3460;
  border-radius: 3px;
  background: #1a1a2e;
  color: #e0e0e0;
  font-size: 0.8rem;
  width: 50px;
}
.header-controls select { width: auto; }
.header-btn {
  padding: 5px 12px;
  border: 1px solid #0f3460;
  border-radius: 4px;
  background: #0f3460;
  color: #e0e0e0;
  font-size: 0.8rem;
}
.header-btn:hover { background: #1a4080; }
.header-btn.danger { border-color: #e74c3c; background: #c0392b; }
.header-btn.danger:hover { background: #e74c3c; }

/* ===== ISLAND SETUP MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.modal {
  background: #16213e;
  border: 2px solid #0f3460;
  border-radius: 8px;
  padding: 24px;
  min-width: 350px;
  max-width: 500px;
}
.modal h2 { color: #e94560; margin-bottom: 16px; }
.modal label { display: block; margin-bottom: 4px; font-size: 0.85rem; color: #a0a0a0; }
.modal input, .modal select {
  width: 100%;
  padding: 8px;
  border: 1px solid #0f3460;
  border-radius: 4px;
  background: #1a1a2e;
  color: #e0e0e0;
  font-size: 0.9rem;
  margin-bottom: 12px;
}
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
.modal .header-btn { padding: 8px 20px; font-size: 0.9rem; }

/* ===== CONTEXT MENU ===== */
.context-menu {
  position: fixed;
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 4px;
  padding: 4px 0;
  min-width: 160px;
  z-index: 200;
  display: none;
}
.context-menu-item {
  padding: 6px 12px;
  font-size: 0.8rem;
  cursor: pointer;
  color: #e0e0e0;
}
.context-menu-item:hover { background: #0f3460; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #1a1a2e; }
::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #1a4080; }

/* ===== TOOLTIP ===== */
.tooltip {
  position: fixed;
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 4px;
  padding: 6px 10px;
  font-size: 0.75rem;
  z-index: 300;
  pointer-events: none;
  display: none;
  max-width: 250px;
}

/* ===== PRODUCTION PLANNER ===== */
.planner-section { margin-bottom: 8px; }
.planner-section h5 {
  font-size: 0.8rem; color: #e94560; margin-bottom: 4px; cursor: pointer; user-select: none;
}
.planner-section h5:hover { color: #ff6b81; }
.planner-inputs { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
.planner-row {
  display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
}
.planner-row label { flex: 1; color: #a0a0a0; }
.planner-row input[type="number"] {
  width: 50px; padding: 2px 4px; border: 1px solid #0f3460; border-radius: 3px;
  background: #1a1a2e; color: #e0e0e0; font-size: 0.75rem; text-align: center;
}
.planner-results { font-size: 0.7rem; }
.planner-resource-group { margin-bottom: 6px; }
.planner-resource-header {
  display: flex; justify-content: space-between; padding: 2px 4px;
  background: #0f3460; border-radius: 2px; margin-bottom: 2px; font-weight: 600;
}
.planner-building-row {
  display: flex; justify-content: space-between; padding: 1px 8px; color: #b0b0b0;
}
.planner-building-row .count { color: #2ecc71; font-weight: 600; }
.planner-building-row.fractional .count { color: #f39c12; }
.producer-switch {
  cursor: pointer; color: #e94560; font-size: 0.7rem; margin-left: 2px;
  border: 1px solid #e94560; border-radius: 3px; padding: 0 3px;
  display: inline-block; line-height: 1.2;
}
.producer-switch:hover { background: #e94560; color: #fff; }
.planner-summary {
  border-top: 1px solid #0f3460; margin-top: 6px; padding-top: 6px;
}
.planner-summary-row {
  display: flex; justify-content: space-between; padding: 1px 4px; font-size: 0.7rem;
}
.planner-surplus { color: #2ecc71; }
.planner-deficit { color: #e74c3c; }
.planner-neutral { color: #a0a0a0; }

/* ===== MOBILE DRAWER TOGGLES ===== */
.mobile-toggle {
  display: none;
  position: fixed;
  z-index: 50;
  width: 40px;
  height: 40px;
  border: 2px solid #0f3460;
  border-radius: 8px;
  background: #16213e;
  color: #e94560;
  font-size: 1.2rem;
  line-height: 1;
  align-items: center;
  justify-content: center;
}
#toggle-left { left: 8px; top: 56px; }
#toggle-right { right: 8px; top: 56px; }

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 900px) {
  #app {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
  }
  header {
    padding: 8px 12px;
    gap: 8px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 1rem; }
  .header-controls { gap: 6px; }
  .header-btn { padding: 6px 10px; font-size: 0.75rem; }

  #left-panel, #right-panel {
    position: fixed;
    top: 0;
    bottom: 0;
    width: 280px;
    z-index: 60;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    padding-top: 50px;
  }
  #left-panel { left: 0; }
  #right-panel {
    right: 0;
    left: auto;
    transform: translateX(100%);
    border-left: 2px solid #0f3460;
    border-right: none;
  }
  #left-panel.open { transform: translateX(0); }
  #right-panel.open { transform: translateX(0); }

  .mobile-toggle { display: flex; }

  .drawer-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 55;
    display: none;
  }
  .drawer-backdrop.show { display: block; }

  /* Larger touch targets */
  .tool-btn { padding: 8px 12px; font-size: 0.85rem; min-height: 36px; }
  .building-btn { padding: 8px 10px; font-size: 0.85rem; min-height: 36px; }
  .tier-header { padding: 8px 10px; font-size: 0.85rem; }
  .building-filter { padding: 8px 10px; font-size: 0.9rem; }
  .context-menu-item { padding: 10px 16px; font-size: 0.9rem; }

  /* Zoom slider wider on mobile */
  #zoom-slider { width: 80px !important; }
}

@media (max-width: 500px) {
  header h1 { display: none; }
  .header-controls label[for="zoom"] { display: none; }
}
</style>
</head>
<body>
<div id="app">
  <button class="mobile-toggle" id="toggle-left" aria-label="Tools">&#9776;</button>
  <button class="mobile-toggle" id="toggle-right" aria-label="Info">&#9432;</button>
  <div class="drawer-backdrop" id="drawer-backdrop"></div>
  <header>
    <h1>PP2 Island Planner</h1>
    <div class="header-controls" id="header-controls">
      <button class="header-btn" id="btn-new-island">New Island</button>
      <button class="header-btn" id="btn-save">Save</button>
      <button class="header-btn" id="btn-load">Load</button>
      <span style="color:#666">|</span>
      <label>Zoom:</label>
      <input type="range" id="zoom-slider" min="10" max="60" value="30" style="width:100px">
      <span id="zoom-label" style="font-size:0.8rem;min-width:35px">30px</span>
      <span style="color:#666">|</span>
      <button class="header-btn" id="btn-undo">Undo</button>
      <button class="header-btn" id="btn-redo">Redo</button>
    </div>
  </header>

  <div id="left-panel">
    <!-- TERRAIN TOOLS -->
    <div class="panel-section">
      <h3>Terrain</h3>
      <div class="tool-group" id="terrain-tools">
        <button class="tool-btn terrain-grass" data-tool="terrain" data-terrain="grass">Grass</button>
        <button class="tool-btn terrain-water" data-tool="terrain" data-terrain="water">Water</button>
        <button class="tool-btn terrain-river" data-tool="terrain" data-terrain="river">River</button>
        <button class="tool-btn terrain-coastal" data-tool="terrain" data-terrain="coastal">Coastal</button>
        <button class="tool-btn terrain-forest" data-tool="terrain" data-terrain="forest">Forest</button>
      </div>
      <h3>Deposits &amp; Tiles</h3>
      <div class="tool-group" id="deposit-tools">
        <!-- Generated dynamically -->
      </div>
      <h3>Actions</h3>
      <div class="tool-group">
        <button class="tool-btn" data-tool="eraser">Eraser</button>
        <button class="tool-btn" data-tool="select">Select</button>
      </div>
    </div>

    <!-- BUILDING PALETTE -->
    <div class="panel-section">
      <h3>Buildings</h3>
      <input type="text" class="building-filter" id="building-filter" placeholder="Filter buildings...">
      <div id="building-list">
        <!-- Generated dynamically -->
      </div>
    </div>
  </div>

  <div id="canvas-area">
    <canvas id="grid-canvas"></canvas>
  </div>

  <div id="right-panel">
    <div class="info-box" id="cell-info">
      <h4>Cell Info</h4>
      <p style="color:#666;font-size:0.8rem;">Hover over a cell</p>
    </div>
    <div class="info-box" id="building-info" style="display:none">
      <h4>Selected Building</h4>
    </div>
    <div class="info-box" id="island-stats">
      <h4>Island Stats</h4>
      <div id="stats-content">No island loaded</div>
    </div>
    <div class="info-box" id="validation-panel">
      <h4>Issues</h4>
      <div id="validation-content" style="color:#666;font-size:0.8rem;">No issues</div>
    </div>
    <div class="info-box" id="production-planner">
      <h4>Production Planner</h4>
      <div class="planner-inputs" id="planner-inputs"></div>
      <div style="display:flex;gap:4px;margin-bottom:6px;">
        <button onclick="calculateProduction()" style="flex:1;padding:4px 8px;background:#e94560;border:none;color:#fff;border-radius:3px;font-size:0.75rem;font-weight:600;">Calculate</button>
        <button onclick="autoPopulate()" style="flex:1;padding:4px 8px;background:#0f3460;border:1px solid #e94560;color:#e94560;border-radius:3px;font-size:0.75rem;font-weight:600;" title="Auto-place all needed buildings on the island">Auto-Place</button>
      </div>
      <div id="auto-populate-result" style="font-size:0.7rem;margin-bottom:4px;min-height:1em;"></div>
      <div class="planner-results" id="planner-results" style="color:#666;font-size:0.75rem;">Set house counts above and click Calculate</div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>
<div class="context-menu" id="context-menu"></div>

<!-- Load game data -->
<script src="data.js"></script>
<!-- Application modules (load order matters: globals first, then consumers) -->
<script src="buildings.js"></script>
<script src="island.js"></script>
<script src="renderer.js"></script>
<script src="ui.js"></script>
<script src="validation.js"></script>
<script src="planner.js"></script>
<script src="saveload.js"></script>
</body>
</html>
